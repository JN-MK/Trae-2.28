<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Life Coach - 你的成长伙伴</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Life Coach</h1>
            <p>与 DeepSeek R1 对话，探索更好的自己</p>
            <div class="header-controls">
                <button id="clear-history-btn" title="清除历史记录">🗑️ 清除</button>
                <button id="analyze-btn" title="分析我的成长">📊 生成成长报告</button>
            </div>
        </header>

        <main id="chat-container">
            <div class="message system-message">
                <div class="avatar">🤖</div>
                <div class="content">你好！我是你的 AI Life Coach。无论你遇到什么困惑，或者只是想聊聊天，我都在这里陪伴你。我们可以一起探讨生活、工作、情感或者个人成长的话题。</div>
            </div>
            <!-- 聊天记录将动态插入到这里 -->
        </main>

        <!-- 分析报告模态框 -->
        <div id="analysis-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2>📈 你的成长分析报告</h2>
                <div id="analysis-result">正在生成分析中，请稍候...</div>
            </div>
        </div>

        <div class="input-area">
            <div class="mood-selector">
                <span>此刻心情:</span>
                <button class="mood-btn" data-mood="开心" title="开心">😄</button>
                <button class="mood-btn" data-mood="平静" title="平静">😌</button>
                <button class="mood-btn" data-mood="焦虑" title="焦虑">😰</button>
                <button class="mood-btn" data-mood="低落" title="低落">😔</button>
                <button class="mood-btn" data-mood="愤怒" title="愤怒">😠</button>
                <span id="current-mood-display"></span>
            </div>
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="输入你想聊的话题..." rows="1"></textarea>
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="loading-indicator" style="display: none;">AI 正在思考...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
